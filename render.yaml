services:
  - type: web
    name: margins-backend
    env: docker
    image:
      url: docker.io/sharang8601/backend:latest
    branch: main
    autoDeploy: false
    envVars:
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
