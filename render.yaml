services:
  - type: web
    name: margins-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    branch: main
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
